  "/authentication/email/register":
    post:
      description: Registers a new user with the given email and password, or logs
        in if the email is already registered. Returns an Access Token and a Refresh
        Token. The email and password should be included in the request body as JSON.
        Any user may register, but to access specific Customer information, contact
        Support to receive an API Key.
      operationId: postEmailRegister
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/AuthenticationEmailRegisterRequestBody"
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TokensResponse"
          description: ''
        '201':
          content:
